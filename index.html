<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Class Interactive</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="leaderboard.js"></script>
  <script type="module" src="game.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main id="site-content" class="container">
    <h1>Reinforcement Learning With Unknown Rules</h1>
    <p id="player-name"></p>
    <div id="game-container">
      <div>
        <div>
          <p class="game-label">Dealer</p>
          <div id="active-card" class="card-area active-card-area"></div>
        </div>
      </div>
      <div>
        <div>
          <p class="game-label">Player Hand</p>
          <div id="player-hand" class="card-area hand"></div>
        </div>
      </div>  
    </div>
    
    <p id="rewards"></p>
    <p id="message"></p>

    <button id="play-card-button">Play</button>
    <button id="discard-card-button">Discard</button>
    <button id="deal-button">New Game</button>

    <h2>History</h3>
    <div id="history"></div>

    <h2 id="progress-chart-heading">Progress</h2>
      <canvas class="plotter" id="progress-chart"></canvas>
    </div>

    <h2>Leaderboard</h2>
    <div id="leaderboard"></div>

    <div class="row">
      <button id="loginBtn">Admin Login</button>
      <button id="clearBtn">Clear Leaderboard</button>
    </div>
  </main>
</body>
</html>
